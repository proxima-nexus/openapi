name: Validate OpenAPI Spec

on:
  pull_request:
    paths:
      - 'openapi.json'
      - 'openapi.yaml'
  push:
    branches:
      - main
      - master
    paths:
      - 'openapi.json'
      - 'openapi.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate OpenAPI YAML
        run: npm run validate

      - name: Check JSON/YAML consistency
        run: |
          # Convert YAML to JSON and compare
          npm install -g js-yaml
          YAML_JSON=$(yaml2json openapi.yaml)
          DIFF=$(diff <(echo "$YAML_JSON" | jq -S .) <(cat openapi.json | jq -S .) || true)
          if [ -n "$DIFF" ]; then
            echo "❌ YAML and JSON files are not consistent!"
            echo "$DIFF"
            exit 1
          fi
          echo "✅ YAML and JSON files are consistent"