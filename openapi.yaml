openapi: 3.0.0
paths:
  /user:
    post:
      operationId: UserController_create
      summary: Create a user
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDto'
      responses:
        '201':
          description: Created user ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutateUserResponseDto'
      tags:
        - user
      security:
        - api_key: []
    get:
      operationId: UserController_search
      summary: Search users
      description: >-
        Search for users. When requesterUserId is provided, HIDDEN users are filtered out unless the requester is
        connected to them, and users who have blocked the requester are also filtered out. When requesterUserId is not
        provided, all users are returned without visibility filtering.
      parameters:
        - name: displayName
          required: false
          in: query
          description: Display name search (ILIKE)
          schema:
            example: Keyword
            type: string
        - name: latitude
          required: false
          in: query
          description: Latitude for radius search
          schema:
            example: 40.7128
            type: number
        - name: longitude
          required: false
          in: query
          description: Longitude for radius search
          schema:
            example: -74.006
            type: number
        - name: radius
          required: false
          in: query
          description: Radius in meters for radius search
          schema:
            example: 5000
            type: number
        - name: minLatitude
          required: false
          in: query
          description: Minimum latitude for bounding box
          schema:
            example: 40
            type: number
        - name: maxLatitude
          required: false
          in: query
          description: Maximum latitude for bounding box
          schema:
            example: 41
            type: number
        - name: minLongitude
          required: false
          in: query
          description: Minimum longitude for bounding box
          schema:
            example: -75
            type: number
        - name: maxLongitude
          required: false
          in: query
          description: Maximum longitude for bounding box
          schema:
            example: -73
            type: number
        - name: limit
          required: false
          in: query
          description: Limit results (1-1000)
          schema:
            example: 100
            type: number
        - name: from
          required: false
          in: query
          description: ISO 8601 date — filter events ending after this time
          schema:
            example: '2025-01-01T00:00:00Z'
            type: string
        - name: to
          required: false
          in: query
          description: ISO 8601 date — filter events starting before this time
          schema:
            example: '2025-12-31T23:59:59Z'
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: >-
            ID of the user searching for users. If set, users will be filtered to only include users that the user can
            see, and requesterConnection will be set on the results.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Users returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserDto'
      tags:
        - user
      security:
        - api_key: []
  /user/{userId}:
    get:
      operationId: UserController_get
      summary: Get a user by ID
      parameters:
        - name: userId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: >-
            ID of the user getting a user by ID. If set, 401 may be returned if the user cannot view the user, otherwise
            requesterConnection will be set on the result.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: User returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
      tags:
        - user
      security:
        - api_key: []
    patch:
      operationId: UserController_update
      summary: Update a user
      parameters:
        - name: userId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user updating the user
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserDto'
      responses:
        '200':
          description: Updated user ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutateUserResponseDto'
      tags:
        - user
      security:
        - api_key: []
    delete:
      operationId: UserController_remove
      summary: Delete a user
      parameters:
        - name: userId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user deleting the user
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User deleted
      tags:
        - user
      security:
        - api_key: []
  /user/{userId}/connections/{targetUserId}:
    put:
      operationId: UserController_putConnection
      summary: Create or update a connection with another user
      description: >-
        Create a friend request, accept a pending request, or block a user. For FRIEND type: creates REQUESTED state if
        no connection exists; target user can accept by setting state to ACTIVE. For BLOCKED type: creates a mutual
        block.
      parameters:
        - name: userId
          required: true
          in: path
          schema:
            type: string
        - name: targetUserId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user creating/modifying the connection (must match userId)
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutateUserConnectionDto'
      responses:
        '200':
          description: Connection created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityConnectionDto'
      tags:
        - user
      security:
        - api_key: []
    delete:
      operationId: UserController_deleteConnection
      summary: Delete a connection with another user
      description: >-
        Remove a friend connection or unblock a user. For BLOCKED connections, only the user who initiated the block can
        unblock.
      parameters:
        - name: userId
          required: true
          in: path
          schema:
            type: string
        - name: targetUserId
          required: true
          in: path
          schema:
            type: string
        - name: type
          required: true
          in: query
          description: Type of connection to delete
          schema:
            enum:
              - friend
              - blocked
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user deleting the connection
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Connection deleted
      tags:
        - user
      security:
        - api_key: []
  /user/{userId}/connections:
    get:
      operationId: UserController_getConnections
      summary: Get connections of a user
      description: >-
        Get user connections with optional type and state filters. Visibility rules apply: HIDDEN/CONNECTIONS users only
        show connections to self or connected users. Only the user themselves can see BLOCKED connections or non-ACTIVE
        states.
      parameters:
        - name: userId
          required: true
          in: path
          schema:
            type: string
        - name: state
          required: false
          in: query
          description: Filter connections by state. Can be multiple values. Non-self requesters can only see ACTIVE connections.
          explode: true
          schema:
            type: array
            items:
              type: string
              enum:
                - incoming_request
                - outgoing_request
                - active
        - name: type
          required: false
          in: query
          description: Filter connections by type. Can be multiple values.
          explode: true
          schema:
            type: array
            items:
              type: string
              enum:
                - friend
                - blocked
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: >-
            ID of the user viewing connections. Required for non-PUBLIC users. Only the user themselves can view BLOCKED
            or non-ACTIVE connections.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Connections returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserEntityConnectionDto'
      tags:
        - user
      security:
        - api_key: []
  /user/batch:
    post:
      operationId: UserController_getBatch
      summary: Get a batch of users by IDs
      parameters:
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: >-
            ID of the user getting a batch of users. If set, users will be filtered to only include users that the user
            can see, and requesterConnection will be set on the results.
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetUsersDto'
      responses:
        '200':
          description: Users returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserDto'
      tags:
        - user
      security:
        - api_key: []
  /user/{userId}/groups:
    get:
      operationId: UserController_getGroups
      summary: Get groups of a user
      parameters:
        - name: userId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: >-
            ID of the user getting groups of a user. If set, groups will be filtered to only include groups that the
            user can see, and requesterConnection will be set on the results.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Groups returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupEntityConnectionDto'
      tags:
        - user
      security:
        - api_key: []
  /user/{userId}/events:
    get:
      operationId: UserController_getEvents
      summary: Get events of a user
      parameters:
        - name: userId
          required: true
          in: path
          schema:
            type: string
        - name: from
          required: false
          in: query
          description: 'ISO 8601 start of range (events ending after this time). Default: NOW()'
          schema:
            type: string
        - name: to
          required: false
          in: query
          description: ISO 8601 end of range (events starting before this time)
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: >-
            ID of the user getting events of a user. If set, events will be filtered to only include events that the
            user can see, and requesterConnection will be set on the results.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Events returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventEntityConnectionDto'
      tags:
        - user
      security:
        - api_key: []
  /event:
    post:
      operationId: EventController_create
      summary: Create an event. Owner will be the user creating the event or the group associated with the event (if set)
      parameters:
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user creating the event
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventDto'
      responses:
        '201':
          description: Created event ID
          content:
            application/json:
              schema:
                type: string
        '400':
          description: Requester user not found, or associated group not found
        '401':
          description: User cannot create events for the associated group
      tags:
        - event
      security:
        - api_key: []
    get:
      operationId: EventController_search
      summary: Search events
      parameters:
        - name: displayName
          required: false
          in: query
          description: Display name search (ILIKE)
          schema:
            example: Keyword
            type: string
        - name: latitude
          required: false
          in: query
          description: Latitude for radius search
          schema:
            example: 40.7128
            type: number
        - name: longitude
          required: false
          in: query
          description: Longitude for radius search
          schema:
            example: -74.006
            type: number
        - name: radius
          required: false
          in: query
          description: Radius in meters for radius search
          schema:
            example: 5000
            type: number
        - name: minLatitude
          required: false
          in: query
          description: Minimum latitude for bounding box
          schema:
            example: 40
            type: number
        - name: maxLatitude
          required: false
          in: query
          description: Maximum latitude for bounding box
          schema:
            example: 41
            type: number
        - name: minLongitude
          required: false
          in: query
          description: Minimum longitude for bounding box
          schema:
            example: -75
            type: number
        - name: maxLongitude
          required: false
          in: query
          description: Maximum longitude for bounding box
          schema:
            example: -73
            type: number
        - name: limit
          required: false
          in: query
          description: Limit results (1-1000)
          schema:
            example: 100
            type: number
        - name: from
          required: false
          in: query
          description: ISO 8601 date — filter events ending after this time
          schema:
            example: '2025-01-01T00:00:00Z'
            type: string
        - name: to
          required: false
          in: query
          description: ISO 8601 date — filter events starting before this time
          schema:
            example: '2025-12-31T23:59:59Z'
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: >-
            ID of the user searching for events. If set, events will be filtered to only include events that the user
            can see, and requesterConnection will be set on the results.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Events returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventDto'
      tags:
        - event
      security:
        - api_key: []
  /event/{eventId}:
    get:
      operationId: EventController_get
      summary: Get an event by ID
      parameters:
        - name: eventId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: >-
            ID of the user searching for events. If set, 401 may be returned if the user cannot view the event,
            otherwise requesterConnection will be set on the result.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Event returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDto'
      tags:
        - event
      security:
        - api_key: []
    put:
      operationId: EventController_update
      summary: >-
        Update an event. For series instances, only the fields provided in the request body will be marked as overridden
        and will no longer be propagated by series-level updates.
      parameters:
        - name: eventId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user updating the event
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventDto'
      responses:
        '200':
          description: Updated event ID
          content:
            application/json:
              schema:
                type: string
      tags:
        - event
      security:
        - api_key: []
    delete:
      operationId: EventController_remove
      summary: Delete an event
      parameters:
        - name: eventId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user deleting the event
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Event deleted
      tags:
        - event
      security:
        - api_key: []
  /event/{eventId}/connection/{userId}:
    put:
      operationId: EventController_addConnection
      summary: Add an attendee to an event
      parameters:
        - name: eventId
          required: true
          in: path
          schema:
            type: string
        - name: userId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user removing an attendee from the event
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutateEventEntityConnectionDto'
      responses:
        '200':
          description: Attendee added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityConnectionDto'
      tags:
        - event
      security:
        - api_key: []
    delete:
      operationId: EventController_removeConnection
      summary: Remove an attendee from an event
      parameters:
        - name: eventId
          required: true
          in: path
          schema:
            type: string
        - name: userId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user removing an attendee from the event
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutateEventEntityConnectionDto'
      responses:
        '204':
          description: Attendee removed
      tags:
        - event
      security:
        - api_key: []
  /event/{eventId}/connections:
    get:
      operationId: EventController_getConnections
      summary: Get connections of an event
      parameters:
        - name: eventId
          required: true
          in: path
          schema:
            type: string
        - name: type
          required: false
          in: query
          description: Filter connections by type. Can be a single type or multiple types (comma-separated or array)
          explode: true
          schema:
            type: array
            items:
              type: string
              enum:
                - attendee
                - admin
                - owner
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: >-
            ID of the user getting connections of the event. If set, 401 may be returned if the user cannot view the
            event connections.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Connections returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserEntityConnectionDto'
      tags:
        - event
      security:
        - api_key: []
  /event/batch:
