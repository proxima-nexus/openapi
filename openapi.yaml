openapi: 3.0.0
paths:
  /user:
    post:
      operationId: UserController_create
      summary: Create a user
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDto'
      responses:
        '201':
          description: Created user ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutateUserResponseDto'
      tags:
        - user
      security:
        - api_key: []
    get:
      operationId: UserController_search
      summary: Search users
      parameters:
        - name: displayName
          required: false
          in: query
          description: Display name search (ILIKE)
          schema:
            example: Keyword
            type: string
        - name: latitude
          required: false
          in: query
          description: Latitude for radius search
          schema:
            example: 40.7128
            type: number
        - name: longitude
          required: false
          in: query
          description: Longitude for radius search
          schema:
            example: -74.006
            type: number
        - name: radius
          required: false
          in: query
          description: Radius in meters for radius search
          schema:
            example: 5000
            type: number
        - name: minLatitude
          required: false
          in: query
          description: Minimum latitude for bounding box
          schema:
            example: 40
            type: number
        - name: maxLatitude
          required: false
          in: query
          description: Maximum latitude for bounding box
          schema:
            example: 41
            type: number
        - name: minLongitude
          required: false
          in: query
          description: Minimum longitude for bounding box
          schema:
            example: -75
            type: number
        - name: maxLongitude
          required: false
          in: query
          description: Maximum longitude for bounding box
          schema:
            example: -73
            type: number
        - name: limit
          required: false
          in: query
          description: Limit results (1-1000)
          schema:
            example: 100
            type: number
      responses:
        '200':
          description: Users returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserDto'
      tags:
        - user
      security:
        - api_key: []
  /user/{userId}:
    get:
      operationId: UserController_findOne
