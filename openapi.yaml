      parameters:
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: >-
            ID of the user getting a batch of events. If set, events will be filtered to only include events that the
            user can see, and requesterConnection will be set on the results.
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetEventsDto'
      responses:
        '200':
          description: Events returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventDto'
      tags:
        - event
      security:
        - api_key: []
  /group:
