info:
  title: proxima-nexus-data-plane-api
  description: Proxima Nexus Data Plane API
  version: 1.0.0
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    api_key:
      type: apiKey
      in: header
      name: X-Proxima-Nexus-Api-Key
  schemas:
    LocationDto:
      type: object
      properties:
        latitude:
          type: number
          description: Latitude in decimal degrees
          example: 40.7128
        longitude:
          type: number
          description: Longitude in decimal degrees
          example: -74.006
        name:
          type: string
          description: Human-readable location name
          example: New York, NY
    CreateUserDto:
      type: object
      properties:
        displayName:
          type: string
          description: Display name
          example: Display Name
        requesterUserId:
          type: string
          description: User ID of the requester
          example: user-123
        visibility:
          type: string
          description: Visibility of the entity
          enum:
            - public
            - connections
            - hidden
          example: public
        location:
          description: Optional location information
          allOf:
            - $ref: '#/components/schemas/LocationDto'
        description:
          type: string
          description: Entity description
          example: A description of the entity
        tags:
          description: Entity tags
          example:
            - tag1
            - tag2
          type: array
          items:
            type: string
        userId:
          type: string
          description: Unique user identifier
          example: user-123
        gender:
          type: string
          description: Gender
          example: female
        birthDate:
          type: string
          description: Birth date (ISO 8601)
          example: '1990-01-01'
      required:
        - displayName
        - requesterUserId
        - visibility
        - userId
        - gender
        - birthDate
    MutateUserResponseDto:
      type: object
      properties:
        userId:
          type: string
          description: User ID
          example: user-123
      required:
        - userId
    UserDto:
      type: object
      properties:
        entityId:
          type: string
          description: Unique identifier for the entity
          example: entity-123
        tenantId:
          type: string
          description: Tenant identifier the entity belongs to
          example: tenant-abc
        displayName:
          type: string
          description: Display name of the entity
          example: Sample Entity
        visibility:
          type: string
          description: Visibility of the entity
          enum:
            - PUBLIC
            - PRIVATE
          example: PUBLIC
        description:
          type: string
          description: Description of the entity
          example: A description of the entity
        tags:
          description: Tags associated with the entity
          example:
            - tag1
            - tag2
          type: array
          items:
            type: string
        createdAt:
          type: string
          description: Date/time the entity was created (ISO string)
          example: '2024-05-01T12:34:56.789Z'
        updatedAt:
          type: string
          description: Date/time the entity was last updated (ISO string)
          example: '2024-05-02T12:34:56.789Z'
        location:
          description: Required location information
          allOf:
            - $ref: '#/components/schemas/LocationDto'
        gender:
          type: string
          description: Gender
          example: female
        birthDate:
          type: string
          description: Birth date (ISO 8601)
          example: '1990-01-01'
      required:
        - gender
        - birthDate
    UpdateUserDto:
      type: object
      properties:
        requesterUserId:
          type: string
          description: User ID of the requester
          example: user-123
        visibility:
          type: string
          description: Visibility of the entity
          enum:
            - public
            - connections
            - hidden
          example: public
        displayName:
          type: string
          description: Display name
          example: Display Name
        location:
          description: Optional location information
          allOf:
            - $ref: '#/components/schemas/LocationDto'
        description:
          type: string
          description: Entity description
          example: A description of the entity
        tags:
          description: Entity tags
          example:
            - tag1
            - tag2
          type: array
          items:
            type: string
        gender:
          type: string
          description: Gender
          example: female
        birthDate:
          type: string
          description: Birth date (ISO 8601)
          example: '1990-01-01'
      required:
        - requesterUserId
        - displayName
        - gender
        - birthDate
    EntityConnectionDto:
      type: object
      properties:
        createdAt:
          type: string
          description: Date/time the connection was created (ISO string)
          example: '2024-05-01T12:34:56.789Z'
        updatedAt:
          type: string
          description: Date/time the connection was last updated (ISO string)
          example: '2024-05-02T12:34:56.789Z'
        state:
          type: string
          description: Connection state
          enum:
            - requested
            - active
            - rejected
      required:
        - state
    UserEntityConnectionDto:
      type: object
      properties:
        createdAt:
          type: string
          description: Date/time the connection was created (ISO string)
          example: '2024-05-01T12:34:56.789Z'
        updatedAt:
          type: string
          description: Date/time the connection was last updated (ISO string)
          example: '2024-05-02T12:34:56.789Z'
        state:
          type: string
          description: Connection state
          enum:
            - requested
            - active
            - rejected
        userId:
          type: string
          description: User ID
          example: user-123
      required:
        - state
        - userId
    GetUsersDto:
      type: object
      properties:
        userIds:
          description: The IDs of the users
          example:
            - 123e4567-e89b-12d3-a456-426614174000
            - 123e4567-e89b-12d3-a456-426614174001
          type: array
          items:
            type: string
      required:
        - userIds
    GroupEntityConnectionDto:
      type: object
      properties:
        createdAt:
          type: string
          description: Date/time the connection was created (ISO string)
          example: '2024-05-01T12:34:56.789Z'
        updatedAt:
          type: string
          description: Date/time the connection was last updated (ISO string)
          example: '2024-05-02T12:34:56.789Z'
        state:
          type: string
          description: Connection state
          enum:
            - requested
            - active
            - rejected
        groupId:
          type: string
          description: Group ID
          example: group-123
      required:
        - state
        - groupId
    EventEntityConnectionDto:
      type: object
      properties:
        createdAt:
          type: string
          description: Date/time the connection was created (ISO string)
          example: '2024-05-01T12:34:56.789Z'
        updatedAt:
          type: string
          description: Date/time the connection was last updated (ISO string)
          example: '2024-05-02T12:34:56.789Z'
        state:
          type: string
          description: Connection state
          enum:
            - requested
            - active
            - rejected
        eventId:
          type: string
          description: Event ID
          example: event-123
      required:
        - state
