      operationId: GroupController_create
      summary: Create a group
      parameters:
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user creating the group
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupDto'
      responses:
        '201':
          description: Created group ID
          content:
            application/json:
              schema:
                type: string
      tags:
        - group
      security:
        - api_key: []
    get:
      operationId: GroupController_search
      summary: Search groups
      parameters:
        - name: displayName
          required: false
          in: query
          description: Display name search (ILIKE)
          schema:
            example: Keyword
            type: string
        - name: latitude
          required: false
          in: query
          description: Latitude for radius search
          schema:
            example: 40.7128
            type: number
        - name: longitude
          required: false
          in: query
          description: Longitude for radius search
          schema:
            example: -74.006
            type: number
        - name: radius
          required: false
          in: query
          description: Radius in meters for radius search
          schema:
            example: 5000
            type: number
        - name: minLatitude
          required: false
          in: query
          description: Minimum latitude for bounding box
          schema:
            example: 40
            type: number
        - name: maxLatitude
          required: false
          in: query
          description: Maximum latitude for bounding box
          schema:
            example: 41
            type: number
        - name: minLongitude
          required: false
          in: query
          description: Minimum longitude for bounding box
          schema:
            example: -75
            type: number
        - name: maxLongitude
          required: false
          in: query
          description: Maximum longitude for bounding box
          schema:
            example: -73
            type: number
        - name: limit
          required: false
          in: query
          description: Limit results (1-1000)
          schema:
            example: 100
            type: number
        - name: from
          required: false
          in: query
          description: ISO 8601 date — filter events ending after this time
          schema:
            example: '2025-01-01T00:00:00Z'
            type: string
        - name: to
          required: false
          in: query
          description: ISO 8601 date — filter events starting before this time
          schema:
            example: '2025-12-31T23:59:59Z'
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: >-
            ID of the user searching for groups. If set, groups will be filtered to only include groups that the user
            can see, and requesterConnection will be set on the results.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Groups returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupDto'
      tags:
        - group
      security:
        - api_key: []
  /group/{groupId}:
    get:
      operationId: GroupController_get
      summary: Get a group by ID
      parameters:
        - name: groupId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: >-
            ID of the user getting a group by ID. If set, 401 may be returned if the user cannot view the group,
            otherwise requesterConnection will be set on the result.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Group returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupDto'
        '401':
          description: User cannot view this group
      tags:
        - group
      security:
        - api_key: []
    patch:
      operationId: GroupController_update
      summary: Update a group
      parameters:
        - name: groupId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user updating the group
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupDto'
      responses:
        '200':
          description: Updated group ID
          content:
            application/json:
              schema:
                type: string
      tags:
        - group
      security:
        - api_key: []
    delete:
      operationId: GroupController_remove
      summary: Delete a group
      parameters:
        - name: groupId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user deleting the group
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Group deleted
      tags:
        - group
      security:
        - api_key: []
  /group/{groupId}/connection/{userId}:
    put:
      operationId: GroupController_addConnection
      summary: Add or update a connection to a group (member, admin, or owner)
      parameters:
        - name: groupId
          required: true
          in: path
          schema:
            type: string
        - name: userId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user adding a connection to the group
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutateGroupEntityConnectionDto'
      responses:
        '200':
          description: Connection added/updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityConnectionDto'
        '401':
          description: User cannot add this connection
      tags:
        - group
      security:
        - api_key: []
    delete:
      operationId: GroupController_removeConnection
      summary: Remove a connection from a group
      parameters:
        - name: groupId
          required: true
          in: path
          schema:
            type: string
        - name: userId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user removing a connection from the group
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutateGroupEntityConnectionDto'
      responses:
        '204':
          description: Connection removed
        '401':
          description: User cannot remove this connection
      tags:
        - group
      security:
        - api_key: []
  /group/{groupId}/connections:
    get:
      operationId: GroupController_getConnections
      summary: Get connections of a group
      parameters:
        - name: groupId
          required: true
          in: path
          schema:
            type: string
        - name: state
          required: false
          in: query
          description: Filter connections by state (e.g., requested for pending approvals)
          explode: true
          schema:
            type: array
            items:
              type: string
              enum:
                - requested
                - active
                - invited
        - name: type
          required: false
          in: query
          description: Filter connections by type. Can be a single type or multiple types (comma-separated or array)
          explode: true
          schema:
            type: array
            items:
              type: string
              enum:
                - member
                - admin
                - owner
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: >-
            ID of the user getting connections of the group. If set, 401 may be returned if the user cannot view the
            group connections.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Connections returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserEntityConnectionDto'
        '401':
          description: User cannot view connections of this group
      tags:
        - group
      security:
        - api_key: []
  /group/{groupId}/events:
    get:
      operationId: GroupController_getEvents
      summary: Get events of a group
      parameters:
        - name: groupId
          required: true
          in: path
          schema:
            type: string
        - name: from
          required: false
          in: query
          description: 'ISO 8601 start of range (events ending after this time). Default: NOW()'
          schema:
            type: string
        - name: to
          required: false
          in: query
          description: ISO 8601 end of range (events starting before this time)
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: >-
            ID of the user getting events of the group. If set, events will be filtered to only include events that the
            user can see, and requesterConnection will be set on the results.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Events returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventEntityConnectionDto'
      tags:
        - group
      security:
        - api_key: []
  /group/batch:
    post:
      operationId: GroupController_getBatch
      summary: Get a batch of groups by IDs
      parameters:
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: >-
            ID of the user getting a batch of groups. If set, groups will be filtered to only include groups that the
            user can see, and requesterConnection will be set on the results.
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetGroupsDto'
      responses:
        '200':
          description: Groups returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupDto'
      tags:
        - group
      security:
        - api_key: []
  /event-series:
    post:
      operationId: EventSeriesController_create
      summary: Create an event series
      description: >-
        Creates a series definition and pre-generates all event instances based on the RRULE. The creating user (or
        associated group) becomes the OWNER.
      parameters:
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user creating the series
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventSeriesDto'
      responses:
        '201':
          description: Created series ID
          content:
            application/json:
              schema:
                type: string
        '400':
          description: Requester user ID missing, or associated group not found
        '401':
          description: User cannot create series for the associated group
      tags:
        - event-series
      security:
        - api_key: []
  /event-series/{seriesId}:
    get:
      operationId: EventSeriesController_get
      summary: Get an event series by ID
      parameters:
        - name: seriesId
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Event series returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventSeriesDto'
        '404':
          description: Series not found
      tags:
        - event-series
      security:
        - api_key: []
    put:
      operationId: EventSeriesController_update
      summary: Update an event series
      description: >-
        Updates the series definition and propagates metadata changes to all upcoming event instances. Fields that were
        individually overridden on a specific instance will not be overwritten.
      parameters:
        - name: seriesId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user updating the series
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventSeriesDto'
      responses:
        '200':
          description: Updated series ID
          content:
            application/json:
              schema:
                type: string
        '401':
          description: User cannot edit this series
        '404':
          description: Series not found
      tags:
        - event-series
      security:
        - api_key: []
    delete:
      operationId: EventSeriesController_remove
      summary: Delete an event series
      description: Deletes the series and all upcoming event instances. Past instances (already started) are preserved.
      parameters:
        - name: seriesId
          required: true
          in: path
          schema:
            type: string
        - name: X-Proxima-Nexus-Requester-User-Id
          in: header
          description: ID of the user deleting the series
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Series deleted
        '401':
          description: User cannot delete this series
        '404':
          description: Series not found
      tags:
        - event-series
      security:
        - api_key: []
  /event-series/{seriesId}/events:
    get:
      operationId: EventSeriesController_getInstances
      summary: List event instances in a series
      description: >-
        Returns event instances belonging to this series, ordered by start time. Defaults to only ongoing/upcoming
        instances.
      parameters:
        - name: seriesId
          required: true
          in: path
          schema:
            type: string
        - name: from
          required: false
          in: query
          description: 'ISO 8601 start of range (events ending after this time). Default: NOW()'
          schema:
            type: string
        - name: to
          required: false
          in: query
          description: ISO 8601 end of range (events starting before this time)
          schema:
            type: string
      responses:
        '200':
          description: Event instances returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventDto'
        '404':
          description: Series not found
      tags:
        - event-series
      security:
        - api_key: []
